# =============================================================
# 주간업무 보고서 템플릿 (사용자 편집 가능)
# -------------------------------------------------------------
# - 이 파일을 수정해 보고서 구조를 자신의 조직에 맞게 바꿀 수 있습니다.
# - 'label'(표시 이름), 'order'(순서), 'hint'(입력 안내), 'metrics'는 자유롭게 수정하세요.
# - 'role' 과 'key' 는 시스템 로직이 의존하는 식별자입니다. 함부로 바꾸거나 지우지 마세요.
#   (특히 role: next_week_plan 은 '다음주 계획 → 금주 신규 Task 승격' 자동화에 사용됩니다.)
# =============================================================

version: 1
meta:
  title: "시스템 운영 주간업무 보고"   # 보고서 머리말에 쓰이는 제목
  week_label_format: "{start} ~ {end}"  # 예: 2026.06.22 ~ 06.26 (월~금 업무주)

categories:
  - key: operation          # 시스템 내부 식별자 (변경/삭제 금지)
    role: operation         # 코드가 의존하는 역할 (변경/삭제 금지)
    label: "시스템 운영 현황"  # 화면·보고서에 보이는 이름 (자유 수정)
    order: 1                # 표시 순서 (자유 수정)
    hint: "가동률/안정성, 주요 지표(트래픽·처리건수·응답시간), 정상 운영 여부"
    metrics:               # 이 카테고리에서 수동 입력받을 정량 지표 정의
      - { name: "가동률",   unit: "%",  trend: true }   # trend:true → 전주 대비 증감 자동계산
      - { name: "처리건수", unit: "건", trend: true }
      - { name: "평균응답", unit: "초", trend: true }

  - key: incident
    role: incident
    label: "장애·이슈 대응"
    order: 2
    hint: "발생 장애 내역, 원인, 조치 결과, 재발 방지책"
    metrics:
      - { name: "장애건수", unit: "건", trend: true }

  - key: routine
    role: routine
    label: "정기 작업"
    order: 3
    hint: "배포, 패치, 백업, 모니터링, 정기 점검 결과"
    metrics: []

  - key: improvement
    role: improvement
    label: "개선·요청 처리"
    order: 4
    hint: "사용자 요청(ITS) 처리, 기능 개선, 데이터 정정"
    metrics:
      - { name: "ITS처리", unit: "건", trend: true }

  - key: next_week
    role: next_week_plan    # ⚠️ 이 role은 '다음주 계획 승격' 자동화에 사용됩니다. 유지하세요.
    label: "다음 주 계획 / 리스크"
    order: 5
    hint: "예정 작업, 점검 필요 사항, 잠재 위험"
    metrics: []

# 동작 옵션 (자유 수정)
options:
  carry_over_statuses: ["진행중", "미완료"]   # 금주로 자동 이월할 지난주 상태
  carry_warn_threshold: 3                       # 이 횟수 이상 이월된 작업은 리스크로 표시
